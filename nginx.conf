# Nginx configuration for Hotel Harmony
# Use this for Docker, self-hosted, or reverse proxy setups

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_vary on;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache static assets with hash in filename
  location ~* /assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Service worker and manifest - always fresh
  location ~* \.(webmanifest|json)$ {
    add_header Content-Type "application/manifest+json";
    add_header Cache-Control "public, max-age=0, must-revalidate";
    expires 0;
  }

  location = /sw.js {
    add_header Content-Type "application/javascript; charset=utf-8";
    add_header Service-Worker-Allowed "/";
    add_header Cache-Control "public, max-age=0, must-revalidate";
    expires 0;
  }

  # Cache other assets
  location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, must-revalidate";
    access_log off;
  }

  # HTML - never cache
  location ~* \.html$ {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    expires 0;
  }

  # Root index.html
  location = / {
    try_files /index.html =404;
  }

  # SPA routing - serve index.html for all routes
  location / {
    try_files $uri $uri/ /index.html?$query_string;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
