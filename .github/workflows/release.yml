name: Auto Release to lhoxtencer-builds

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag in private repo
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a v${{ steps.version.outputs.version }} -m "Release version ${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install

      - name: Build application
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Push tag to lhoxtencer-builds
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Add builds repo as remote using token
          git remote add releases https://x-access-token:${{ secrets.RELEASE_REPO_TOKEN }}@github.com/Andreson13/lhoxtencer-builds.git || git remote set-url releases https://x-access-token:${{ secrets.RELEASE_REPO_TOKEN }}@github.com/Andreson13/lhoxtencer-builds.git

          # Push tag only (not full source)
          git push releases v${{ steps.version.outputs.version }}

          echo "✅ Tag v${{ steps.version.outputs.version }} pushed to lhoxtencer-builds"
