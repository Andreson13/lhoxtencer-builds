name: Auto Release to lhoxtencer-builds

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write
  repository-projects: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag in private repo
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a v${{ steps.version.outputs.version }} -m "Release version ${{ steps.version.outputs.version }}"
          git push -u origin v${{ steps.version.outputs.version }}

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install

      - name: Build application
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Notify - Tag created
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          echo "✅ Version v${{ steps.version.outputs.version }} tagged and ready for release"
          echo "📦 Build artifacts ready in dist/"
          echo "🚀 Next: Tag will be pushed to lhoxtencer-builds for public release"
