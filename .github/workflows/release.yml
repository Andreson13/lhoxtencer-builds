name: Auto Release to lhoxtencer-builds

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag in private repo
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a v${{ steps.version.outputs.version }} -m "Release version ${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install

      - name: Build application
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Create release in lhoxtencer-builds (public repo - artifacts only)
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              // Create release on lhoxtencer-builds with artifacts
              const release = await github.rest.repos.createRelease({
                owner: 'Andreson13',
                repo: 'lhoxtencer-builds',
                tag_name: 'v${{ steps.version.outputs.version }}',
                name: 'Version ${{ steps.version.outputs.version }}',
                body: `## Lhoxtencer Build Release v${{ steps.version.outputs.version }}\n\nAutomatic release with built artifacts only.\n\n**Features:**\n- 🏨 Hotel Management System\n- 📱 Progressive Web App\n- 🔄 Automatic Updates\n- 🌐 Offline Support`,
                draft: false,
                prerelease: false
              });

              console.log('✅ Release created:', release.data.html_url);
            } catch (error) {
              console.error('Release creation failed:', error.message);
              // Continue anyway - manual release can be created
            }
