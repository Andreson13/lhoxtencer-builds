[build]
  command = "bun run build"
  publish = "dist"

# IMPORTANT: Exclude static files BEFORE catch-all
[[redirects]]
  from = "/assets/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/pwa-*.svg"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/placeholder.svg"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/*.webmanifest"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/sw.js"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/workbox-*.js"
  to = "/:splat"
  status = 200

# SPA routing - catch-all LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"