<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Lhoxtencer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1a2f52" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" rx="60" fill="url(#bg)" />
  <!-- Left vertical bar (dark navy) -->
  <rect x="50" y="40" width="50" height="210" rx="15" fill="#f8fafc" opacity="0.95"/>
  <!-- Bottom horizontal bar (dark navy) -->
  <rect x="50" y="235" width="135" height="35" rx="10" fill="#f8fafc" opacity="0.95"/>
  <!-- Right vertical bar (gold) -->
  <rect x="170" y="95" width="50" height="175" rx="12" fill="#b8860b"/>
  <!-- Hotel window group (gold) -->
  <g fill="#f8fafc" opacity="0.9">
    <!-- Top-left window -->
    <rect x="180" y="130" width="25" height="25" rx="3"/>
    <!-- Top-right window -->
    <rect x="215" y="130" width="25" height="25" rx="3"/>
    <!-- Bottom-left window -->
    <rect x="180" y="165" width="25" height="25" rx="3"/>
    <!-- Bottom-right window -->
    <rect x="215" y="165" width="25" height="25" rx="3"/>
  </g>
</svg>