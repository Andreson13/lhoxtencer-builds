<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lhoxtencer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1a2f52" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)" />
  <!-- Left vertical bar (cream/light) -->
  <rect x="100" y="80" width="100" height="420" rx="30" fill="#f8fafc" opacity="0.95"/>
  <!-- Bottom horizontal bar (cream/light) -->
  <rect x="100" y="470" width="270" height="70" rx="20" fill="#f8fafc" opacity="0.95"/>
  <!-- Right vertical bar (gold) -->
  <rect x="340" y="190" width="100" height="350" rx="24" fill="#b8860b"/>
  <!-- Hotel window group (light) -->
  <g fill="#f8fafc" opacity="0.9">
    <!-- Top-left window -->
    <rect x="360" y="260" width="50" height="50" rx="6"/>
    <!-- Top-right window -->
    <rect x="430" y="260" width="50" height="50" rx="6"/>
    <!-- Bottom-left window -->
    <rect x="360" y="330" width="50" height="50" rx="6"/>
    <!-- Bottom-right window -->
    <rect x="430" y="330" width="50" height="50" rx="6"/>
  </g>
</svg>